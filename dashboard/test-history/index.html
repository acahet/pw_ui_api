<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test History Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --surface2:  #1f2333;
      --border:    #2a2f42;
      --border2:   #363c54;
      --text:      #e2e4ec;
      --muted:     #7b82a0;
      --accent:    #5b7cf6;
      --accent2:   #7c9fff;

      --pass:      #2dd4a0;
      --pass-bg:   rgba(45,212,160,.12);
      --fail:      #f25f5c;
      --fail-bg:   rgba(242,95,92,.12);
      --flaky:     #f5a623;
      --flaky-bg:  rgba(245,166,35,.12);
      --skip:      #7b82a0;
      --skip-bg:   rgba(123,130,160,.12);

      --radius:    8px;
      --radius-lg: 12px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 220px 1fr;
      grid-template-areas:
        "topbar topbar"
        "sidebar main";
      min-height: 100vh;
    }

    .topbar {
      grid-area: topbar;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.3px;
    }

    .topbar-brand svg { flex-shrink: 0; }

    .topbar-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--border2);
      padding: 0 18px;
      margin-bottom: 6px;
      margin-top: 20px;
    }

    .sidebar-section-label:first-child { margin-top: 0; }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: color .15s, background .15s, border-color .15s;
      text-decoration: none;
      user-select: none;
    }

    .sidebar-item:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .sidebar-item.active {
      color: var(--text);
      background: rgba(91,124,246,.08);
      border-left-color: var(--accent);
    }

    .sidebar-item svg {
      flex-shrink: 0;
      opacity: .7;
    }

    .sidebar-item.active svg { opacity: 1; }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 18px;
    }

    /* Sidebar search input */
    .sidebar-search {
      margin: 4px 14px 8px;
      position: relative;
    }

    .sidebar-search input {
      width: 100%;
      padding: 7px 10px 7px 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      transition: border-color .15s;
    }

    .sidebar-search input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .sidebar-search input::placeholder { color: var(--muted); }

    .sidebar-search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* Sidebar run list (mini) */
    .sidebar-run {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
      border-left: 3px solid transparent;
    }

    .sidebar-run:hover { background: var(--surface2); color: var(--text); }

    .sidebar-run.active {
      background: rgba(91,124,246,.08);
      border-left-color: var(--accent);
      color: var(--text);
    }

    .sidebar-run-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-run-info { flex: 1; min-width: 0; }
    .sidebar-run-date { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-run-stat { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .main {
      grid-area: main;
      padding: 24px 28px 48px;
      min-width: 0;
    }

    /* ── Latest run stat cards ──────────────────────────────── */
    .latest-run-section {
      margin-bottom: 28px;
    }

    .latest-run-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .latest-run-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .latest-run-ts {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .latest-stats-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .latest-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 3px solid transparent;
    }

    .latest-stat.pass-card  { border-top-color: var(--pass); }
    .latest-stat.fail-card  { border-top-color: var(--fail); }
    .latest-stat.flaky-card { border-top-color: var(--flaky); }
    .latest-stat.skip-card  { border-top-color: var(--skip); }
    .latest-stat.dur-card   { border-top-color: var(--accent); }
    .latest-stat.rate-card  { border-top-color: var(--accent2); }
    .latest-stat.total-card { border-top-color: var(--border2); }

    .latest-stat-label {
      font-size: 10px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .latest-stat-value {
      font-size: 26px;
      font-weight: 600;
      font-family: var(--mono);
      line-height: 1;
    }

    .latest-stat.clickable {
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
    }

    .latest-stat.clickable:hover {
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .latest-stat.clickable.active-filter {
      background: var(--surface2);
      box-shadow: 0 0 0 1px var(--border2);
    }

    .latest-stat.pass-card.active-filter  { box-shadow: 0 0 0 1px var(--pass); }
    .latest-stat.fail-card.active-filter  { box-shadow: 0 0 0 1px var(--fail); }
    .latest-stat.flaky-card.active-filter { box-shadow: 0 0 0 1px var(--flaky); }
    .latest-stat.skip-card.active-filter  { box-shadow: 0 0 0 1px var(--skip); }

    /* Show all filter banner */
    .filter-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      margin-bottom: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }

    .filter-banner-label { color: var(--muted); }
    .filter-banner-label strong { color: var(--text); }

    .filter-banner-clear {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .filter-banner-clear:hover { color: var(--text); border-color: var(--text); }

    /* ── Stats row ──────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-card-label {
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .stat-card-value {
      font-size: 32px;
      font-weight: 600;
      font-family: var(--mono);
      line-height: 1;
    }

    .stat-card-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Section titles ─────────────────────────────────────── */
    .section { margin-bottom: 28px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-family: var(--mono);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    /* ── Tab toggle ─────────────────────────────────────────── */
    .tab-group {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }

    .tab-btn {
      padding: 6px 16px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      transition: all .15s;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Chart panels ───────────────────────────────────────── */
    .chart-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
    }

    /* Stacked bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 160px;
      padding-bottom: 28px; /* room for labels */
      position: relative;
      overflow-x: auto;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 28px;
      gap: 0;
      height: 100%;
      justify-content: flex-end;
      position: relative;
      cursor: pointer;
    }

    .bar-stack {
      width: 100%;
      display: flex;
      flex-direction: column-reverse; /* pass on bottom, fail on top */
      border-radius: 3px 3px 0 0;
      overflow: hidden;
      transition: opacity .15s;
    }

    .bar-col:hover .bar-stack { opacity: .8; }

    .bar-seg-pass {
      background: var(--pass);
      transition: height .3s ease;
    }

    .bar-seg-fail {
      background: var(--fail);
      transition: height .3s ease;
    }

    .bar-seg-skip {
      background: var(--skip);
      opacity: .5;
      transition: height .3s ease;
    }

    .bar-lbl {
      position: absolute;
      bottom: 0;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      white-space: nowrap;
      text-align: center;
    }

    /* Tooltip */
    .bar-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 11px;
      font-family: var(--mono);
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      line-height: 1.7;
    }

    .bar-col:hover .bar-tooltip { display: block; }

    /* Duration line chart */
    .dur-chart {
      height: 80px;
      position: relative;
      overflow: hidden;
    }

    .dur-chart svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── Chart legend ───────────────────────────────────────── */
    .chart-legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Two-column layout for charts ───────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 12px;
      margin-bottom: 28px;
    }

    .dur-panel .section-title { margin-bottom: 12px; display: block; }

    /* ── Individual test trend ──────────────────────────────── */
    .test-view { display: none; }
    .test-view.active { display: block; }

    .search-box {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      margin-bottom: 14px;
      transition: border-color .15s;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-box::placeholder { color: var(--muted); }

    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .test-grid::-webkit-scrollbar { width: 4px; }
    .test-grid::-webkit-scrollbar-track { background: transparent; }
    .test-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .test-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .test-card:hover { border-color: var(--border2); background: var(--surface); }
    .test-card.selected { border-color: var(--accent); background: rgba(91,124,246,.07); }

    .test-card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .test-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .test-card-project {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Sparkline */
    .sparkline {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .spark-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .spark-dot.pass  { background: var(--pass); }
    .spark-dot.fail  { background: var(--fail); }
    .spark-dot.flaky { background: var(--flaky); }
    .spark-dot.skip  { background: var(--skip); opacity: .5; }
    .spark-dot.none  { background: var(--border2); }

    .test-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .tag {
      font-size: 10px;
      font-family: var(--mono);
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(91,124,246,.15);
      color: var(--accent2);
      border: 1px solid rgba(91,124,246,.25);
    }

    /* Test trend detail */
    .test-detail {
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
    }

    .test-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .test-detail-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }

    .test-detail-stats {
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .test-detail-stat {
      text-align: right;
    }

    .test-detail-stat-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
    }

    .test-detail-stat-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .trend-row {
      border-radius: var(--radius);
      margin-bottom: 4px;
      border-left: 3px solid transparent;
      background: var(--surface2);
      transition: background .15s;
      overflow: hidden;
    }

    .trend-row:hover { background: var(--surface); }
    .trend-row.pass  { border-left-color: var(--pass); }
    .trend-row.fail  { border-left-color: var(--fail); }
    .trend-row.flaky { border-left-color: var(--flaky); }
    .trend-row.skip  { border-left-color: var(--skip); }

    .trend-row-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      cursor: default;
    }

    .trend-row.has-detail .trend-row-summary { cursor: pointer; }

    .trend-row-left { flex: 1; min-width: 0; }

    .trend-row-date {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .trend-row-runid {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--border2);
      margin-top: 1px;
    }

    .trend-row-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .trend-row-status {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      min-width: 46px;
      text-align: right;
    }

    .trend-row-dur {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      min-width: 48px;
      text-align: right;
    }

    .trend-row-chevron {
      font-size: 10px;
      color: var(--muted);
      transition: transform .2s;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    .trend-row-chevron.open { transform: rotate(180deg); }

    /* Expandable failure body */
    .trend-row-body {
      display: none;
      padding: 0 12px 12px;
      border-top: 1px solid var(--border);
    }

    .trend-row-body.open { display: block; }

    /* Annotation label (from test.info().annotations title) */
    .annot-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--flaky);
      margin-bottom: 4px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .annot-desc {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    /* Collapsible raw Playwright error */
    .error-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      margin-top: 6px;
      padding: 4px 0;
    }

    .error-toggle:hover { color: var(--text); }

    .error-toggle-icon {
      font-size: 9px;
      transition: transform .15s;
    }

    .error-toggle-icon.open { transform: rotate(90deg); }

    .trend-row-error {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fail);
      margin-top: 4px;
      padding: 8px 10px;
      background: var(--fail-bg);
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .trend-row-error.open { display: block; }

    /* Test detail annotation header block */
    .test-annot-block {
      margin-bottom: 16px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .test-annot-type {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent2);
      margin-bottom: 4px;
    }

    .test-annot-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Runs list ──────────────────────────────────────────── */
    .run-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color .15s;
    }

    .run-card:hover { border-color: var(--border2); }

    .run-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      gap: 16px;
    }

    .run-card-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }

    .run-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .run-card-ts {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .run-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.pass  { background: var(--pass-bg);  color: var(--pass);  }
    .badge.fail  { background: var(--fail-bg);  color: var(--fail);  }
    .badge.flaky { background: var(--flaky-bg); color: var(--flaky); }
    .badge.skip  { background: var(--skip-bg);  color: var(--skip);  }

    .run-card-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .run-dur {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .run-chevron {
      color: var(--muted);
      font-size: 11px;
      transition: transform .2s;
    }

    .run-chevron.open { transform: rotate(180deg); }

    /* Run detail */
    .run-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px 18px;
    }

    .run-detail.open { display: block; }

    .run-detail-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .show-all-btn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent2);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .show-all-btn:hover { color: var(--accent); }

    .detail-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .test-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius);
      border-left: 3px solid transparent;
      background: var(--surface2);
      margin-bottom: 4px;
    }

    .test-row.pass  { border-left-color: var(--pass); }
    .test-row.fail  { border-left-color: var(--fail); }
    .test-row.flaky { border-left-color: var(--flaky); }
    .test-row.skip  { border-left-color: var(--skip); opacity: .7; }

    .test-row-body { flex: 1; min-width: 0; }

    .test-row-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .test-row-meta {
      display: flex;
      gap: 12px;
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .test-row-error {
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--fail-bg);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fail);
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .test-row-error.open { display: block; }

    .test-row-error-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      background: none;
      border: none;
      padding: 0;
    }

    .test-row-error-toggle:hover { color: var(--fail); }

    .test-row-error-icon {
      font-size: 9px;
      transition: transform .15s;
      display: inline-block;
    }

    .test-row-error-icon.open { transform: rotate(90deg); }

    .artifact-links {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .artifact-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: rgba(91,124,246,.12);
      border: 1px solid rgba(91,124,246,.25);
      color: var(--accent2);
      text-decoration: none;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      transition: background .15s;
    }

    .artifact-link:hover { background: rgba(91,124,246,.22); }

    /* ── States ─────────────────────────────────────────────── */
    .state-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--muted);
      text-align: center;
      gap: 12px;
    }

    .state-screen-icon {
      font-size: 36px;
      line-height: 1;
    }

    .state-screen h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .state-screen p {
      font-size: 13px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .shell { grid-template-columns: 180px 1fr; }
    }

    @media (max-width: 768px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-areas: "topbar" "main";
      }
      .sidebar { display: none; }
      .latest-stats-row { grid-template-columns: repeat(4, 1fr); }
      .main { padding: 16px 14px 48px; }
    }

    @media (max-width: 560px) {
      .latest-stats-row { grid-template-columns: repeat(2, 1fr); }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }

    /* ── Test detail sub-panels ─────────────────────────────── */
    .detail-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 700px) {
      .detail-panels { grid-template-columns: 1fr; }
    }

    .detail-sub-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .detail-sub-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Duration mini chart */
    .dur-mini {
      height: 72px;
      position: relative;
    }

    .dur-mini svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .dur-mini-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .dur-delta {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
    }

    .dur-delta.up   { color: var(--fail);  background: var(--fail-bg); }
    .dur-delta.down { color: var(--pass);  background: var(--pass-bg); }
    .dur-delta.flat { color: var(--muted); background: var(--surface); border: 1px solid var(--border); }

    /* Failure reason bars */
    .reason-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .reason-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .reason-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .reason-label {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 78%;
      font-family: var(--mono);
    }

    .reason-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .reason-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .reason-bar-fill {
      height: 100%;
      background: var(--fail);
      border-radius: 2px;
      transition: width .4s ease;
    }

    .reason-bar-fill.flaky { background: var(--flaky); }

    .no-failures-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      padding: 8px 0;
      text-align: center;
    }

    /* ── Health grade ───────────────────────────────────────── */
    .health-grade {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .grade-A { background: var(--pass-bg);  color: var(--pass);  }
    .grade-B { background: rgba(91,124,246,.15); color: var(--accent2); }
    .grade-C { background: var(--flaky-bg); color: var(--flaky); }
    .grade-D { background: rgba(242,95,92,.2); color: var(--fail); }
    .grade-F { background: var(--fail-bg);  color: var(--fail);  }

    /* ── Slow badge ─────────────────────────────────────────── */
    .slow-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      background: var(--flaky-bg);
      color: var(--flaky);
      margin-left: 6px;
      flex-shrink: 0;
    }

    /* ── Page views (dashboard / trends / gallery) ──────────── */
    .page-view { display: none; }
    .page-view.active { display: block; }

    /* ── Trends page ────────────────────────────────────────── */
    .trends-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    @media (max-width: 700px) { .trends-grid { grid-template-columns: 1fr; } }

    .trend-mini-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
    }

    .trend-mini-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .trend-mini-current {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 10px;
    }

    .trend-mini-svg {
      height: 60px;
      width: 100%;
    }

    .trend-mini-svg svg { width: 100%; height: 100%; overflow: visible; }

    .trend-mini-footer {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Sidebar filter chips ───────────────────────────────── */
    .sidebar-filter-section {
      padding: 0 12px;
      margin-bottom: 6px;
    }

    .sidebar-filter-group-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--border2);
      margin: 12px 6px 6px;
    }

    .sidebar-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .sidebar-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap;
    }

    .sidebar-chip:hover { border-color: var(--border2); color: var(--text); }
    .sidebar-chip.active { background: rgba(91,124,246,.12); border-color: var(--accent); color: var(--accent2); }

    .sidebar-chip-count {
      background: var(--border);
      border-radius: 3px;
      padding: 0 4px;
      font-size: 9px;
    }

    .sidebar-chip.active .sidebar-chip-count { background: rgba(91,124,246,.25); }

    /* ── Gallery page ───────────────────────────────────────── */
    .gallery-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    .gallery-run-group {
      margin-bottom: 28px;
    }

    .gallery-run-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .gallery-run-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .gallery-run-ts {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .gallery-run-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .gallery-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }

    .gallery-item:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .gallery-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .gallery-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-img-placeholder {
      font-size: 28px;
      opacity: .3;
    }

    .gallery-item-info {
      padding: 8px 10px;
    }

    .gallery-item-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-item-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Lightbox ────────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 88vw;
      max-height: 78vh;
      border-radius: var(--radius);
      object-fit: contain;
      display: block;
    }

    .lightbox-title {
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,.65);
      text-align: center;
      max-width: 80vw;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.8);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      line-height: 1;
    }

    .lightbox-close:hover { background: rgba(255,255,255,.2); color: #fff; }

    /* ── Export button ───────────────────────────────────────── */
    .export-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .export-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(91,124,246,.08); }

    /* ── Print / PDF ─────────────────────────────────────────── */
    #printReport { display: none; }

    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: #fff !important; color: #1a1a1a !important; font-family: Georgia, serif; }
      .shell { display: block !important; }
      .topbar, .sidebar, .footer, .export-btn,
      .tab-group, .filter-banner, .lightbox,
      #testDetail, #testView, .run-detail { display: none !important; }
      .main { padding: 0 !important; }
      #mainContent { display: none !important; }
      #printReport { display: block !important; }

      .pr-page { max-width: 780px; margin: 0 auto; padding: 32px 40px; }
      .pr-header { background: #0f1117 !important; color: #fff !important; padding: 24px 28px; border-radius: 8px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
      .pr-brand { font-family: monospace; font-size: 10px; color: #5b7cf6; text-transform: uppercase; letter-spacing: .08em; }
      .pr-project { font-size: 20px; font-weight: 700; color: #fff; font-family: sans-serif; margin: 5px 0 3px; }
      .pr-run-meta { font-size: 11px; color: #7b82a0; font-family: monospace; }
      .pr-grade { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: monospace; font-size: 18px; font-weight: 700; }
      .pr-grade-A { background: rgba(45,212,160,.2); color: #2dd4a0; }
      .pr-grade-B { background: rgba(91,124,246,.2); color: #7c9fff; }
      .pr-grade-C { background: rgba(245,166,35,.2); color: #f5a623; }
      .pr-grade-D, .pr-grade-F { background: rgba(242,95,92,.2); color: #f25f5c; }
      .pr-section-title { font-family: sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #999; border-bottom: 1px solid #eee; padding-bottom: 5px; margin: 20px 0 10px; }
      .pr-kpi-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
      .pr-kpi { background: #f8f9fa !important; border-radius: 6px; padding: 10px 12px; }
      .pr-kpi-label { font-size: 9px; font-family: sans-serif; text-transform: uppercase; letter-spacing: .08em; color: #999; margin-bottom: 4px; }
      .pr-kpi-value { font-size: 22px; font-weight: 700; font-family: monospace; line-height: 1; }
      .pr-trend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
      .pr-trend-label { font-size: 10px; font-family: monospace; color: #666; width: 56px; }
      .pr-trend-bg { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
      .pr-trend-fill { height: 100%; border-radius: 3px; }
      .pr-trend-val { font-size: 10px; font-family: monospace; color: #999; width: 34px; text-align: right; }
      .pr-failure-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid #f0f0f0; }
      .pr-failure-row:last-child { border-bottom: none; }
      .pr-failure-count { font-family: monospace; font-size: 12px; font-weight: 700; color: #c0392b; min-width: 26px; text-align: right; }
      .pr-failure-bar-wrap { width: 70px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
      .pr-failure-bar { height: 100%; background: #e74c3c; border-radius: 2px; }
      .pr-failure-msg { font-family: monospace; font-size: 10px; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pr-suite-title { font-family: sans-serif; font-size: 11px; font-weight: 600; color: #444; background: #f4f4f4 !important; padding: 5px 10px; border-radius: 4px; margin: 10px 0 4px; page-break-after: avoid; }
      .pr-test-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; border-bottom: 0.5px solid #f5f5f5; font-family: sans-serif; font-size: 11px; page-break-inside: avoid; }
      .pr-test-row:last-child { border-bottom: none; }
      .pr-test-name { flex: 1; color: #333; }
      .pr-test-dur { font-family: monospace; font-size: 10px; color: #aaa; margin: 0 10px; }
      .pr-status { font-size: 9px; font-family: monospace; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
      .pr-s-pass  { background: #eaf8f2 !important; color: #0f6e56; }
      .pr-s-fail  { background: #fef0f0 !important; color: #a32d2d; }
      .pr-s-flaky { background: #fef9ec !important; color: #854f0b; }
      .pr-s-skip  { background: #f5f5f5 !important; color: #888; }
      .pr-footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 9px; font-family: monospace; color: #ccc; }
      @page { margin: 12mm 10mm; size: A4; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Top bar -->

    </div>
    <div class="sidebar-item" id="nav-trends" onclick="navTo('trends',this)">

      Trends
    </div>
    <div class="sidebar-item" id="nav-search" onclick="navTo('search',this)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Search tests
    </div>

      Gallery
    </div>

    <div class="sidebar-divider"></div>
    <span class="sidebar-section-label">Filters</span>
    <div class="sidebar-filter-section" id="sidebarFilters">
      <div style="font-family:var(--mono);font-size:11px;color:var(--border2);padding:4px 6px">loading…</div>
    </div>

    <div class="sidebar-divider"></div>
    <span class="sidebar-section-label">Recent runs</span>
    <div id="sidebarRuns">
      <div style="padding:8px 18px;font-family:var(--mono);font-size:11px;color:var(--border2)">loading…</div>
    </div>
  </nav>

  <!-- Lightbox — click overlay to close, click img/title to stay open -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
    <div class="lightbox-title" id="lightboxTitle" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Main content -->
  <main class="main" id="mainContent">
    <div class="state-screen">
      <div class="spinner"></div>
      <p>Loading test history…</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>created by <a href="https://github.com/acahet" target="_blank" rel="noopener">acahet</a></span>
    <span id="footerProject"></span>
  </footer>

</div>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

// For use in src/href/data-* attributes — only escapes double-quotes, leaves path chars intact
function safePath(p) { return (p ?? '').replace(/"/g, '&quot;'); }

function fmtDate(ts) {
  return new Date(ts).toLocaleString(undefined, {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function fmtDur(ms) {
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  const m = Math.floor(ms / 60000);
  const s = ((ms % 60000) / 1000).toFixed(0).padStart(2, '0');
  return `${m}m ${s}s`;
}

function statusColor(s) {
  return { passed:'var(--pass)', failed:'var(--fail)', flaky:'var(--flaky)', skipped:'var(--skip)' }[s] ?? 'var(--skip)';
}

function statusClass(s) {
  return { passed:'pass', failed:'fail', flaky:'flaky', skipped:'skip' }[s] ?? 'skip';
}

// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — generated by @acahet/playwright-reporter after every run
// ─────────────────────────────────────────────────────────────────────────────
const CONFIG = {
  pageTitle:        "Reporter",
  projectName:      "PW-UI-API",
  brandName:        "ACAHET DASHBOARD",
  historyIndexPath: "history-index.json",
  emptyTitle:       "No test history yet",
  emptyMessage:     "Run your tests to start tracking history.",
  errorTitle:       "Could not load history",
  errorMessage:     "Make sure history-index.json is in the same directory.",
};
// ─────────────────────────────────────────────────────────────────────────────
let runs = [];
let allTests = [];
let selectedTestKey = null;
let activeFilter = null; // 'passed' | 'failed' | 'flaky' | 'skipped' | null
let sidebarTagFilter = null;
let sidebarSpecFilter = null;
let currentPage = 'dashboard'; // 'dashboard' | 'trends' | 'gallery'

// ── Health grade ───────────────────────────────────────────────────────────
function computeGrade(run) {
  if (!run.totalTests) return 'F';
  const passRate   = run.passed / run.totalTests;
  const stability  = 1 - ((run.flaky ?? 0) / run.totalTests);
  const allT       = run.allTests ?? [];
  const p75        = computeP75(allT.map(t => t.duration));
  const slowCount  = allT.filter(t => t.duration > p75 * 1.5).length;
  const perfScore  = 1 - (slowCount / run.totalTests);
  const score      = (passRate * 0.6 + stability * 0.3 + perfScore * 0.1) * 100;
  if (score >= 95) return 'A';
  if (score >= 85) return 'B';
  if (score >= 70) return 'C';
  if (score >= 50) return 'D';
  return 'F';
}

function computeP75(durations) {
  if (!durations.length) return 0;
  const sorted = [...durations].sort((a, b) => a - b);
  return sorted[Math.floor(sorted.length * 0.75)];
}

function isSlowTest(t, p75) { return t.duration > p75 * 1.5; }

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  // Apply config values that need JS to set
  document.title = CONFIG.pageTitle;
  const bn = document.getElementById('brandName');
  if (bn && CONFIG.brandName) bn.textContent = CONFIG.brandName;
  const pn = document.getElementById('projectName');
  if (pn && CONFIG.projectName) pn.textContent = CONFIG.projectName;
  const fp = document.getElementById('footerProject');
  if (fp && CONFIG.projectName) fp.textContent = CONFIG.projectName;

  try {
    const res = await fetch(`${CONFIG.historyIndexPath}?ts=${Date.now()}`, {
      cache: 'no-store'
    });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (!data.runs?.length) { renderEmpty(); return; }
    runs = data.runs;
    render();
  } catch {
    renderError();
  }
}

function renderEmpty() {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-screen">
      <div class="state-screen-icon">🎭</div>
      <h3>${esc(CONFIG.emptyTitle)}</h3>
      <p>${esc(CONFIG.emptyMessage)}</p>
    </div>`;
}

function renderError() {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-screen">
      <div class="state-screen-icon">⚠️</div>
      <h3>${esc(CONFIG.errorTitle)}</h3>
      <p>${esc(CONFIG.errorMessage)}</p>
    </div>`;
}

// ── Main render ────────────────────────────────────────────────────────────
function render() {
  const latest = runs[0];
  const totalRuns = runs.length;
  const avgPass = runs.reduce((s, r) =>
    s + (r.totalTests > 0 ? r.passed / r.totalTests * 100 : 0), 0) / runs.length;
  const latestRate = latest.totalTests > 0
    ? (latest.passed / latest.totalTests * 100).toFixed(1)
    : '0.0';

  document.getElementById('topbarMeta').textContent =
    `${totalRuns} runs · last: ${fmtDate(latest.timestamp)}`;

  buildTestIndex();
  renderSidebar();
  renderSidebarFilters();
  const exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.style.display = 'inline-flex';
  renderMainContent(latest, totalRuns, avgPass, latestRate);
}

function renderMainContent(latest, totalRuns, avgPass, latestRate) {
  document.getElementById('mainContent').innerHTML = `
    <!-- Latest run stat cards -->
    <div class="latest-run-section">
      <div class="latest-run-header">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="health-grade grade-${computeGrade(latest)}" title="Suite health grade">${computeGrade(latest)}</span>
          <span class="latest-run-title">Latest run</span>
        </div>
        <span class="latest-run-ts">${fmtDate(latest.timestamp)} · ${fmtDur(latest.duration)}</span>
      </div>
      <div class="latest-stats-row">
        <div class="latest-stat rate-card clickable ${activeFilter===null?'active-filter':''}"
             onclick="clearFilter()" title="Show all tests">
          <span class="latest-stat-label">Pass rate · ALL</span>
          <span class="latest-stat-value" style="color:${latestRate>=80?'var(--pass)':latestRate>=50?'var(--flaky)':'var(--fail)'}">${latestRate}<span style="font-size:16px">%</span></span>
        </div>
        <div class="latest-stat pass-card ${latest.passed>0?'clickable':''} ${activeFilter==='passed'?'active-filter':''}"
             ${latest.passed>0?`onclick="filterLatestRun('passed')" title="Filter: passed"`:''}> 
          <span class="latest-stat-label">Passed</span>
          <span class="latest-stat-value" style="color:var(--pass)">${latest.passed}</span>
        </div>
        <div class="latest-stat fail-card ${latest.failed>0?'clickable':''} ${activeFilter==='failed'?'active-filter':''}"
             ${latest.failed>0?`onclick="filterLatestRun('failed')" title="Filter: failed"`:''}> 
          <span class="latest-stat-label">Failed</span>
          <span class="latest-stat-value" style="color:${latest.failed>0?'var(--fail)':'var(--muted)'}">${latest.failed}</span>
        </div>
        <div class="latest-stat flaky-card ${(latest.flaky??0)>0?'clickable':''} ${activeFilter==='flaky'?'active-filter':''}"
             ${(latest.flaky??0)>0?`onclick="filterLatestRun('flaky')" title="Filter: flaky"`:''}> 
          <span class="latest-stat-label">Flaky</span>
          <span class="latest-stat-value" style="color:${(latest.flaky??0)>0?'var(--flaky)':'var(--muted)'}">${latest.flaky ?? 0}</span>
        </div>
        <div class="latest-stat skip-card ${latest.skipped>0?'clickable':''} ${activeFilter==='skipped'?'active-filter':''}"
             ${latest.skipped>0?`onclick="filterLatestRun('skipped')" title="Filter: skipped"`:''}> 
          <span class="latest-stat-label">Skipped</span>
          <span class="latest-stat-value" style="color:var(--muted)">${latest.skipped}</span>
        </div>
        <div class="latest-stat total-card">
          <span class="latest-stat-label">Total</span>
          <span class="latest-stat-value">${latest.totalTests}</span>
        </div>
        <div class="latest-stat dur-card">
          <span class="latest-stat-label">Duration</span>
          <span class="latest-stat-value" style="color:var(--accent);font-size:20px">${fmtDur(latest.duration)}</span>
        </div>
      </div>
    </div>

    <!-- Trend + duration charts -->
    <div class="charts-grid">
      <div class="section">
        <div class="section-header">
          <span class="section-title">Test results trend</span>
          <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('overall',this)">Overall</button>
            <button class="tab-btn" onclick="switchTab('test',this)">Per test</button>
          </div>
        </div>

        <!-- Overall trend (stacked bars) -->
        <div id="overallView">
          <div class="chart-panel">
            <div class="bar-chart" id="barChart"></div>
            <div class="chart-legend">
              <div class="legend-item"><span class="legend-dot" style="background:var(--pass)"></span>Passed</div>
              <div class="legend-item"><span class="legend-dot" style="background:var(--fail)"></span>Failed</div>
              <div class="legend-item"><span class="legend-dot" style="background:var(--skip);opacity:.5"></span>Skipped</div>
            </div>
          </div>
        </div>

        <!-- Per-test search + grid (no detail here) -->
        <div id="testView" class="test-view">
          <input class="search-box" id="testSearch" placeholder="Search tests, projects, tags…" oninput="filterTests()">
          <div class="test-grid" id="testGrid"></div>
          <div style="margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--muted)" id="testSelectHint">
            ↑ select a test to see its full history
          </div>
        </div>
      </div>

      <!-- Duration panel -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">Run duration</span>
        </div>
        <div class="chart-panel dur-panel">
          <div class="dur-chart" id="durChart"></div>
          <div class="chart-legend" style="margin-top:8px;padding-top:8px">
            <div class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Duration</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Test detail — full width, below the charts grid -->
    <div id="testDetail" style="margin-bottom:28px"></div>

    <!-- Runs list -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Recent runs (${totalRuns})</span>
      </div>
      <div id="runsList"></div>
    </div>
  `;

  renderBarChart();
  renderDurChart();
  renderRunsList();
  renderTestGrid(allTests);
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('sidebarRuns');
  if (!el) return;

  el.innerHTML = runs.slice(0, 15).map((run, idx) => {
    const isPass = run.failed === 0;
    const rate   = run.totalTests > 0 ? Math.round(run.passed / run.totalTests * 100) : 0;
    return `
      <div class="sidebar-run ${idx === 0 ? 'active' : ''}"
           onclick="jumpToRun(${idx})">
        <span class="sidebar-run-dot" style="background:${isPass ? 'var(--pass)' : 'var(--fail)'}"></span>
        <div class="sidebar-run-info">
          <div class="sidebar-run-date">${fmtDate(run.timestamp)}</div>
          <div class="sidebar-run-stat">${rate}% · ${fmtDur(run.duration)}</div>
        </div>
      </div>`;
  }).join('');
}

window.navTo = (view, el) => {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentPage = view;

  const mc = document.getElementById('mainContent');

  if (view === 'dashboard') {
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (view === 'trends') {
    mc.innerHTML = '<div id="trendsPage"></div>';
    renderTrendsPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (view === 'gallery') {
    mc.innerHTML = '<div id="galleryPage"></div>';
    renderGalleryPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (view === 'search') {
    render();
    setTimeout(() => {
      const testBtn = document.querySelectorAll('.tab-btn')[1];
      if (testBtn) switchTab('test', testBtn);
      document.getElementById('testSearch')?.focus();
    }, 50);
  }
};

// ── Sidebar filters ────────────────────────────────────────────────────────
function renderSidebarFilters() {
  const el = document.getElementById('sidebarFilters');
  if (!el) return;

  // Collect tags across all runs
  const tagCounts = new Map();
  const specCounts = new Map();
  runs.forEach(run => {
    (run.allTests ?? []).forEach(t => {
      (t.tags ?? []).forEach(tag => tagCounts.set(tag, (tagCounts.get(tag) ?? 0) + 1));
      const spec = t.file?.split('/').pop() ?? t.file;
      if (spec) specCounts.set(spec, (specCounts.get(spec) ?? 0) + 1);
    });
  });

  const tags  = [...tagCounts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 12);
  const specs = [...specCounts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 8);

  el.innerHTML = `
    ${tags.length ? `
      <div class="sidebar-filter-group-title">Tags</div>
      <div class="sidebar-chips">
        ${tags.map(([tag, cnt]) => `
          <div class="sidebar-chip ${sidebarTagFilter===tag?'active':''}"
               onclick="toggleTagFilter(${JSON.stringify(tag)})">
            ${esc(tag)}
            <span class="sidebar-chip-count">${cnt}</span>
          </div>`).join('')}
      </div>` : ''}
    ${specs.length ? `
      <div class="sidebar-filter-group-title">Specs</div>
      <div class="sidebar-chips">
        ${specs.map(([spec, cnt]) => `
          <div class="sidebar-chip ${sidebarSpecFilter===spec?'active':''}"
               onclick="toggleSpecFilter(${JSON.stringify(spec)})">
            ${esc(spec)}
            <span class="sidebar-chip-count">${cnt}</span>
          </div>`).join('')}
      </div>` : ''}`;
}

window.toggleTagFilter = (tag) => {
  sidebarTagFilter = sidebarTagFilter === tag ? null : tag;
  sidebarSpecFilter = null;
  renderSidebarFilters();
  // Switch to search view and apply filter
  const searchBtn = document.getElementById('nav-search');
  if (searchBtn) navTo('search', searchBtn);
  setTimeout(() => {
    const input = document.getElementById('testSearch');
    if (input) { input.value = tag; filterTests(); }
  }, 80);
};

window.toggleSpecFilter = (spec) => {
  sidebarSpecFilter = sidebarSpecFilter === spec ? null : spec;
  sidebarTagFilter = null;
  renderSidebarFilters();
  const searchBtn = document.getElementById('nav-search');
  if (searchBtn) navTo('search', searchBtn);
  setTimeout(() => {
    const input = document.getElementById('testSearch');
    if (input) { input.value = spec; filterTests(); }
  }, 80);
};

// ── Trends page ────────────────────────────────────────────────────────────
function renderTrendsPage() {
  const el = document.getElementById('trendsPage');
  if (!el) return;

  const display = runs.slice(0, 30).reverse();

  const passRates  = display.map(r => r.totalTests > 0 ? (r.passed / r.totalTests * 100) : 0);
  const durations  = display.map(r => r.duration);
  const flakyCnts  = display.map(r => r.flaky ?? 0);
  const slowCnts   = display.map(r => {
    const allT = r.allTests ?? [];
    const p75  = computeP75(allT.map(t => t.duration));
    return allT.filter(t => isSlowTest(t, p75)).length;
  });

  el.innerHTML = `
    <div class="section-header" style="margin-bottom:20px">
      <span class="section-title">Trends · last ${display.length} runs</span>
    </div>
    <div class="trends-grid">
      ${buildTrendMiniPanel('Pass rate', passRates, display, v => v.toFixed(1)+'%', 'var(--pass)', true)}
      ${buildTrendMiniPanel('Duration', durations, display, v => fmtDur(v), 'var(--accent)', false)}
      ${buildTrendMiniPanel('Flaky tests', flakyCnts, display, v => v+'', 'var(--flaky)', false)}
      ${buildTrendMiniPanel('Slow tests', slowCnts, display, v => v+'', '#a78bfa', false)}
    </div>`;
}

function buildTrendMiniPanel(label, values, display, fmt, color, higherIsBetter) {
  const current = values[values.length - 1] ?? 0;
  const prev    = values[values.length - 2] ?? current;
  const delta   = prev !== 0 ? ((current - prev) / Math.abs(prev) * 100) : 0;
  const deltaGood = higherIsBetter ? delta >= 0 : delta <= 0;
  const deltaStr  = delta === 0 ? '~ stable'
    : `${delta > 0 ? '+' : ''}${delta.toFixed(0)}% vs prev`;
  const deltaColor = delta === 0 ? 'var(--muted)' : deltaGood ? 'var(--pass)' : 'var(--fail)';

  if (values.length < 2) {
    return `<div class="trend-mini-panel">
      <div class="trend-mini-title">${label}</div>
      <div class="trend-mini-current" style="color:${color}">${fmt(current)}</div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px">Not enough data</div>
    </div>`;
  }

  const W = 280, H = 55;
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = maxV - minV || 1;

  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * W;
    const y = H - ((v - minV) / range) * (H - 8) - 4;
    return [x.toFixed(1), y.toFixed(1)];
  });

  const polyline = pts.map(p => p.join(',')).join(' ');
  const areaPath = `M${pts[0][0]},${H} ${pts.map(p=>`L${p[0]},${p[1]}`).join(' ')} L${pts[pts.length-1][0]},${H} Z`;

  const dotsSvg = pts.map((p, i) =>
    `<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="${color}" opacity=".85">
      <title>${fmt(values[i])} · ${fmtDate(display[i].timestamp)}</title>
    </circle>`
  ).join('');

  return `
    <div class="trend-mini-panel">
      <div class="trend-mini-title">
        ${label}
        <span style="color:${deltaColor};font-size:10px">${deltaStr}</span>
      </div>
      <div class="trend-mini-current" style="color:${color}">${fmt(current)}</div>
      <div class="trend-mini-svg">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="tg-${label.replace(/\s/g,'')}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${color}" stop-opacity=".2"/>
              <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${areaPath}" fill="url(#tg-${label.replace(/\s/g,'')})"/>
          <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${dotsSvg}
        </svg>
      </div>
      <div class="trend-mini-footer">
        <span>min ${fmt(Math.min(...values))}</span>
        <span>avg ${fmt(values.reduce((a,b)=>a+b,0)/values.length)}</span>
        <span>max ${fmt(Math.max(...values))}</span>
      </div>

}

// ── Gallery page ────────────────────────────────────────────────────────────
function renderGalleryPage() {
  const el = document.getElementById('galleryPage');
  if (!el) return;

  const isImagePath = p => /\.(png|jpg|jpeg|webp)$/i.test(p);

  // Support both artifacts.screenshot (old reporter) and attachmentPaths images (new reporter)
  const groups = runs.map(run => {
    const shots = (run.allTests ?? []).flatMap(t => {
      if (t.artifacts?.screenshot) return [{ src: t.artifacts.screenshot, t }];
      const fromAttachments = (t.attachmentPaths ?? []).filter(isImagePath);
      return fromAttachments.length ? [{ src: fromAttachments[0], t }] : [];
    });
    return { run, shots };
  }).filter(g => g.shots.length > 0);

  if (!groups.length) {
    el.innerHTML = `
      <div class="section-header" style="margin-bottom:20px">
        <span class="section-title">Screenshots gallery</span>
      </div>
      <div class="gallery-empty">
        No screenshots found.<br>Screenshots are captured on failure — run tests with <code>screenshot: 'on'</code> or <code>'on-first-retry'</code>.
      </div>`;
    return;
  }

  const totalShots = groups.reduce((s, g) => s + g.shots.length, 0);

  el.innerHTML = `
    <div class="section-header" style="margin-bottom:20px">
      <span class="section-title">Screenshots gallery · ${totalShots} image${totalShots !== 1 ? 's' : ''}</span>
    </div>
    ${groups.map(({ run, shots }) => `
      <div class="gallery-run-group">
        <div class="gallery-run-header">
          <span class="gallery-run-dot" style="background:${run.failed===0?'var(--pass)':'var(--fail)'}"></span>
          <span class="gallery-run-ts">${fmtDate(run.timestamp)}</span>
          <span class="gallery-run-count">${shots.length} screenshot${shots.length!==1?'s':''}</span>
        </div>
        <div class="gallery-grid">
          ${shots.map(({ src, t }) => `
            <div class="gallery-item" data-src="${safePath(src)}" data-title="${esc(t.title)}">
              <div class="gallery-img-wrap">
                <img src="${safePath(src)}" alt="${esc(t.title)}"
                     onerror="this.parentElement.innerHTML='<span class=\\'gallery-img-placeholder\\'>📷</span>'">
              </div>
              <div class="gallery-item-info">
                <div class="gallery-item-title">${esc(t.title)}</div>
                <div class="gallery-item-meta">${esc(t.project)} · ${fmtDur(t.duration)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('')}`;

  // Event delegation — no inline onclick with interpolated paths
  el.onclick = (e) => {
    const card = e.target.closest('.gallery-item');
    if (!card) return;
    if (card.dataset.src) openLightbox(card.dataset.src, card.dataset.title || '');
  };
}

window.openLightbox = (src, title) => {
  const img = document.getElementById('lightboxImg');
  const lbl = document.getElementById('lightboxTitle');
  const lb  = document.getElementById('lightbox');
  if (!img || !lb) return;
  img.src = src;
  img.alt = title;
  if (lbl) lbl.textContent = title;
  lb.classList.add('open');
};

window.closeLightbox = () => {
  const lb  = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  if (lb)  lb.classList.remove('open');

};

// ── PDF export ─────────────────────────────────────────────────────────────
function buildRecurringFailures() {
  const counts = new Map();
  runs.forEach(run => {
    (run.allTests ?? []).filter(t => t.status === 'failed' || t.status === 'flaky').forEach(t => {
      if (!t.error) return;
      const key = t.error.split('\n')[0].replace(/\d+/g,'N').replace(/'.+?'/g,"'…'").replace(/".+?"/g,'"…"').trim().substring(0, 72);
      counts.set(key, (counts.get(key) ?? 0) + 1);
    });
  });
  return [...counts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 8).map(([label, cnt]) => ({ label, cnt }));
}

function buildPrintReport() {
  const latest      = runs[0];
  const projectName = document.getElementById('projectName')?.textContent || CONFIG.projectName || CONFIG.brandName;
  const grade       = computeGrade(latest);
  const latestRate  = latest.totalTests > 0 ? (latest.passed / latest.totalTests * 100).toFixed(1) : '0';
  const allT        = latest.allTests ?? [];
  const failures    = buildRecurringFailures();
  const maxCnt      = failures[0]?.cnt ?? 1;
  const trendRuns   = runs.slice(0, 7).reverse();

  const suites = new Map();
  allT.forEach(t => {
    const suite = t.file?.split('/').pop()?.replace(/\.spec\.(ts|js)$/, '') ?? 'Tests';
    if (!suites.has(suite)) suites.set(suite, []);
    suites.get(suite).push(t);
  });

  const sc = s => ({ passed:'pr-s-pass', failed:'pr-s-fail', flaky:'pr-s-flaky', skipped:'pr-s-skip' }[s] ?? 'pr-s-skip');

  return `
    <div class="pr-page">
      <div class="pr-header">
        <div>
          <div class="pr-brand">${esc(CONFIG.brandName)} · test report</div>
          <div class="pr-project">${esc(projectName)}</div>
          <div class="pr-run-meta">Run ${esc(latest.runId ?? '')} · ${fmtDate(latest.timestamp)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700;color:#fff;font-family:monospace">${latestRate}%</div>
            <div style="font-size:10px;color:#7b82a0;font-family:monospace">pass rate</div>
          </div>
          <div class="pr-grade pr-grade-${grade}">${grade}</div>
        </div>
      </div>

      <div class="pr-section-title">Run summary</div>
      <div class="pr-kpi-row">
        <div class="pr-kpi"><div class="pr-kpi-label">Passed</div><div class="pr-kpi-value" style="color:#0f6e56">${latest.passed}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">Failed</div><div class="pr-kpi-value" style="color:#a32d2d">${latest.failed}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">Flaky</div><div class="pr-kpi-value" style="color:#854f0b">${latest.flaky ?? 0}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">Skipped</div><div class="pr-kpi-value" style="color:#888">${latest.skipped}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">Duration</div><div class="pr-kpi-value" style="color:#185fa5;font-size:16px">${fmtDur(latest.duration)}</div></div>
      </div>

      <div class="pr-section-title">Pass rate trend · last ${trendRuns.length} runs</div>
      ${trendRuns.map(r => {
        const rate = r.totalTests > 0 ? (r.passed / r.totalTests * 100) : 0;
        const col  = rate >= 80 ? '#2dd4a0' : rate >= 50 ? '#f5a623' : '#f25f5c';
        return `<div class="pr-trend-row">
          <div class="pr-trend-label">${fmtDate(r.timestamp).split(',')[0]}</div>
          <div class="pr-trend-bg"><div class="pr-trend-fill" style="width:${rate.toFixed(0)}%;background:${col}"></div></div>
          <div class="pr-trend-val">${rate.toFixed(0)}%</div>
        </div>`;
      }).join('')}

      ${failures.length ? `
        <div class="pr-section-title">Recurring failures</div>
        ${failures.map(({ label, cnt }) => `
          <div class="pr-failure-row">
            <div class="pr-failure-count">${cnt}×</div>
            <div class="pr-failure-bar-wrap"><div class="pr-failure-bar" style="width:${(cnt/maxCnt*100).toFixed(0)}%"></div></div>
            <div class="pr-failure-msg">${esc(label)}</div>
          </div>`).join('')}` : ''}

      <div class="pr-section-title">Test results by suite</div>
      ${[...suites.entries()].map(([suite, tests]) => `
        <div class="pr-suite-title">${esc(suite)}</div>
        ${tests.map(t => `
          <div class="pr-test-row">
            <span class="pr-test-name">${esc(t.title)}</span>
            <span class="pr-test-dur">${fmtDur(t.duration)}</span>
            <span class="pr-status ${sc(t.status)}">${t.status}</span>
          </div>`).join('')}`).join('')}

      <div class="pr-footer">
        <span>generated by ${esc(CONFIG.brandName)} · acahet</span>
        <span>${esc(latest.runId ?? '')}</span>
      </div>
    </div>`;
}

// ── Stacked bar chart ──────────────────────────────────────────────────────
function renderBarChart() {
  const el = document.getElementById('barChart');
  const display = runs.slice(0, 30).reverse();
  const maxTotal = Math.max(...display.map(r => r.totalTests), 1);

  el.innerHTML = display.map(r => {
    const pct = v => ((v / maxTotal) * 132).toFixed(1); // 132px usable height
    const passH  = pct(r.passed);
    const failH  = pct(r.failed);
    const skipH  = pct(r.skipped);
    const stackH = (+passH + +failH + +skipH);
    const date   = fmtDate(r.timestamp).split(',')[0];
    const rate   = r.totalTests > 0 ? (r.passed / r.totalTests * 100).toFixed(0) : 0;

    return `
      <div class="bar-col">
        <div class="bar-tooltip">
          <div style="color:var(--pass)">${r.passed} passed</div>
          ${r.failed  > 0 ? `<div style="color:var(--fail)">${r.failed} failed</div>` : ''}
          ${r.flaky   > 0 ? `<div style="color:var(--flaky)">${r.flaky} flaky</div>` : ''}
          ${r.skipped > 0 ? `<div style="color:var(--skip)">${r.skipped} skipped</div>` : ''}
          <div style="color:var(--muted);margin-top:2px">${rate}% pass · ${fmtDur(r.duration)}</div>
        </div>
        <div class="bar-stack" style="height:${stackH}px">
          ${r.skipped > 0 ? `<div class="bar-seg-skip"  style="height:${skipH}px"></div>` : ''}
          ${r.failed  > 0 ? `<div class="bar-seg-fail"  style="height:${failH}px"></div>` : ''}
          <div class="bar-seg-pass" style="height:${passH}px"></div>
        </div>
        <div class="bar-lbl">${date}</div>
      </div>`;
  }).join('');
}

// ── Duration line chart (SVG) ─────────────────────────────────────────────
function renderDurChart() {
  const el = document.getElementById('durChart');
  const display = runs.slice(0, 30).reverse();
  if (display.length < 2) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">Not enough data yet</div>'; return; }

  const W = 300, H = 70;
  const durations = display.map(r => r.duration);
  const minD = Math.min(...durations);
  const maxD = Math.max(...durations);
  const range = maxD - minD || 1;

  const pts = display.map((r, i) => {
    const x = (i / (display.length - 1)) * W;
    const y = H - ((r.duration - minD) / range) * (H - 10) - 4;
    return [x.toFixed(1), y.toFixed(1)];
  });

  const polyline = pts.map(p => p.join(',')).join(' ');
  const areaPath = `M${pts[0][0]},${H} ` +
    pts.map(p => `L${p[0]},${p[1]}`).join(' ') +
    ` L${pts[pts.length-1][0]},${H} Z`;

  el.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="durGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity=".25"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#durGrad)"/>
      <polyline points="${polyline}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--accent)" opacity=".8">
        <title>${fmtDur(display[i].duration)} · ${fmtDate(display[i].timestamp)}</title>
      </circle>`).join('')}
    </svg>`;
}

window.switchTab = (view, btn) => {
