name: Deploy Test Reports to GitHub Pages

on:
    workflow_run:
        workflows: ["UI Tests CI"]
        types:
            - completed
    # Allow manual trigger
    workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        # Only run on successful test runs or manual trigger
        if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  # Download from the workflow run that triggered this
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ github.event.workflow_run.id }}
                  name: playwright-report
                  path: ./report

            - name: Prepare report structure
              run: |
                  # Rename report-index.html to index.html for GitHub Pages root
                  if [ -f ./report/report-index.html ]; then
                      mv ./report/report-index.html ./report/index.html
                  fi
                  # List files for debugging
                  ls -la ./report/

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact for GitHub Pages
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./report

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
